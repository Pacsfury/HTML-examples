The basic JS Console in HTML steps:

- Connect the external JS File to index.html. 
- Using console.log() to print the statement in the console.

Here's the syntax:
**### _"index.html" file_**
```
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Using console.log to print simple statement in console using javascript</title>
</head>
<body>
<script src="app.js"></script>
</body>
</html>
```
